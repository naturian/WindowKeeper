name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WindowKeeper.Tests/WindowKeeper.Tests.csproj

      - name: Build and analyze
        run: dotnet build WindowKeeper.Tests/WindowKeeper.Tests.csproj -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test WindowKeeper.Tests/WindowKeeper.Tests.csproj -c Release --no-build --logger "trx;LogFileName=tests.trx"
